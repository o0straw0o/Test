<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronologie — La Larme d'Argent</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;font-family:'Crimson Text',serif;color:#f0f0f0;padding:0;}
#main-nav{position:sticky;top:0;z-index:100;background:#111;border-bottom:2px solid rgba(255,255,255,.18);box-shadow:0 2px 8px rgba(0,0,0,.5);}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;align-items:center;min-height:50px;gap:4px;}
.nav-brand{flex-shrink:0;margin-right:10px;padding-right:12px;border-right:1px solid #444;}
.nav-title{display:block;font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#fff;line-height:1.3;}
.nav-sub{display:block;font-family:'Cinzel',serif;font-size:.42rem;letter-spacing:.18em;color:rgba(255,255,255,.42);text-transform:uppercase;font-style:italic;}
.nav-links{display:flex;flex:1;gap:0;overflow-x:auto;scrollbar-width:none;}
.nav-links::-webkit-scrollbar{display:none;}
.nav-link{display:flex;flex-direction:column;align-items:center;padding:9px 8px;text-decoration:none;color:rgba(255,255,255,.42);font-family:'Cinzel',serif;transition:color .2s,border-color .2s;border-bottom:2px solid transparent;flex-shrink:0;}
.nav-link:hover{color:rgba(255,255,255,.82);border-bottom-color:rgba(255,255,255,.3);}
.nav-link.active{color:#fff;border-bottom-color:#fff;}
.nav-icon{font-size:.85rem;line-height:1;margin-bottom:2px;}
.nav-label{font-size:.44rem;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;}
.mj-toggle{flex-shrink:0;margin-left:8px;padding:5px 10px;background:transparent;border:1px solid #555;border-radius:20px;font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.38);cursor:pointer;transition:all .2s;white-space:nowrap;}
.mj-toggle:hover,.mj-toggle.mj-on{background:rgba(255,255,255,.1);border-color:#fff;color:#fff;}
.nav-burger{display:none;margin-left:8px;background:transparent;border:1px solid #555;color:rgba(255,255,255,.35);padding:4px 8px;cursor:pointer;font-size:1rem;border-radius:6px;}
@media(max-width:860px){.nav-links{display:none;}.nav-links.open{display:flex;flex-direction:column;position:fixed;top:50px;left:0;right:0;background:#111;border-bottom:2px solid rgba(255,255,255,.18);z-index:99;max-height:calc(100vh - 50px);overflow-y:auto;}.nav-link{flex-direction:row;justify-content:flex-start;gap:12px;padding:13px 20px;border-bottom:1px solid #333;}.nav-label{font-size:.62rem;}.nav-burger{display:block;}}
.mj-only{display:none;}

.page-wrap{max-width:820px;margin:0 auto;padding:20px 14px 56px;}

/* Période header */
.periode-head{display:flex;align-items:center;gap:10px;margin:24px 0 14px;}
.periode-head:first-child{margin-top:0;}
.ph-line{flex:1;height:1px;background:rgba(255,255,255,.2);}
.ph-label{font-family:'Cinzel',serif;font-size:.56rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;white-space:nowrap;}

/* Timeline */
.timeline-wrap{position:relative;padding-left:32px;}
.timeline-wrap::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:rgba(255,255,255,.2);}

.tl-item{position:relative;margin-bottom:10px;}
.tl-dot{position:absolute;left:-29px;top:14px;width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.18);background:#111;flex-shrink:0;}
.tl-dot.historique{background:#111;}
.tl-dot.session{background:#fff;}
.tl-dot.faction{background:#336;}
.tl-dot.revelation{background:#c00;border-color:#c00;}

.tl-card{background:#1a1a1a;border:1.5px solid rgba(255,255,255,.15);border-radius:10px;overflow:hidden;cursor:pointer;transition:background .15s;}
.tl-card:not(.open):hover{background:#202020;}
.tl-card.open{cursor:default;border-width:2px;}
.tl-card-head{padding:10px 14px 8px;display:flex;align-items:flex-start;gap:10px;}
.tl-head-info{flex:1;min-width:0;}
.tl-date{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:2px;}
.tl-titre{font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;letter-spacing:.04em;line-height:1.25;}
.tl-type-badge{font-family:'Cinzel',serif;font-size:.42rem;letter-spacing:.1em;text-transform:uppercase;border:1.5px solid;border-radius:20px;padding:1px 7px;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:2px;}
.tl-type-badge.historique{border-color:rgba(255,255,255,.42);color:rgba(255,255,255,.5);}
.tl-type-badge.session{border-color:rgba(255,255,255,.2);color:#f0f0f0;}
.tl-type-badge.faction{border-color:#336;color:#336;}
.tl-type-badge.revelation{border-color:#c00;color:#c00;}
.tl-chevron{font-size:.6rem;color:rgba(255,255,255,.42);transition:transform .2s;margin-top:3px;flex-shrink:0;}
.tl-card.open .tl-chevron{transform:rotate(180deg);}

.tl-card-div{height:1px;background:rgba(255,255,255,.2);margin:0 14px;display:none;}
.tl-card.open .tl-card-div{display:block;}
.tl-body{padding:0 14px 10px;display:none;}
.tl-card.open .tl-body{display:block;}
.tl-desc{font-size:.8rem;font-style:italic;color:rgba(255,255,255,.78);line-height:1.6;margin:8px 0 6px;}
.chip-list{display:flex;flex-wrap:wrap;gap:4px;}
.chip{font-size:.72rem;font-style:italic;color:rgba(255,255,255,.65);padding:1px 7px;border:1px solid rgba(255,255,255,.12);border-radius:8px;}

@media(max-width:600px){.timeline-wrap{padding-left:24px;}.timeline-wrap::before{left:5px;}.tl-dot{left:-22px;width:12px;height:12px;top:13px;}}
</style>
</head>
<body>

<div class="page-wrap">
  <div id="timeline-wrap">
    <p style="font-style:italic;color:rgba(255,255,255,.5);font-size:.82rem;text-align:center;padding:40px;">Chargement…</p>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/nav.js"></script>
<script>
const PERIODE_LABELS = {
  avant_campagne:    'Avant la campagne',
  avant_session_01:  'Avant la session 1',
  session_01:        'Session 1'
};
const TYPE_LABELS = {
  historique: 'Historique',
  session:    'Session',
  faction:    'Faction',
  revelation: 'Révélation'
};

let TIMELINE_DATA = [];
async function init() {
  try {
    TIMELINE_DATA = await loadData('timeline.json');
    render(TIMELINE_DATA);
  } catch(e) {
    document.getElementById('timeline-wrap').innerHTML =
      '<p style="color:#c00;font-size:.82rem;font-style:italic;text-align:center;padding:40px;">⚠ Données inaccessibles en file://. Utiliser un serveur local.</p>';
  }
}

function render(events) {
  if (!getMJMode()) events = events.filter(e => e.visible_joueurs !== false);
  const _pdsLS=(() => { try{ return JSON.parse(localStorage.getItem('sw_timeline_periods'))||null; }catch(e){ return null; } })();
  const periodes = _pdsLS || [...new Set(events.map(e=>e.periode).filter(Boolean))];
  let html = '';
  periodes.forEach(p => {
    const evts = events.filter(e => e.periode === p);
    if (!evts.length) return;
    html += `<div class="periode-head"><div class="ph-line"></div><span class="ph-label">${PERIODE_LABELS[p] || p.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</span><div class="ph-line"></div></div>`;
    html += `<div class="timeline-wrap">`;
    evts.forEach(e => {
      const mjCls = e.visible_joueurs ? '' : ' mj-only';
      const entitesChips = (e.entites_liees || [])
        .map(id => `<span class="chip">${id.replace('pnj_','').replace('pj_','Av. ')}</span>`).join('');
      html += `
      <div class="tl-item${mjCls}">
        <div class="tl-dot ${e.type}"></div>
        <div class="tl-card" id="tl-${e.id||events.indexOf(e)}" onclick="toggleEvt('${e.id||events.indexOf(e)}',event)">
          <div class="tl-card-head">
            <div class="tl-head-info">
              <div class="tl-date">${e.date_fiction}</div>
              <div class="tl-titre">${e.titre}</div>
            </div>
            <span class="tl-type-badge ${e.type}">${TYPE_LABELS[e.type] || e.type}</span>
            <span class="tl-chevron">▾</span>
          </div>
          <div class="tl-card-div"></div>
          <div class="tl-body">
            <p class="tl-desc">${e.description}</p>
            ${entitesChips ? `<div class="chip-list">${entitesChips}</div>` : ''}
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('timeline-wrap').innerHTML = html;
  applyMJMode(getMJMode());
}

function toggleEvt(id, event) {
  if (['A','BUTTON','INPUT'].includes(event.target.tagName)) return;
  const card = document.getElementById('tl-' + id);
  if (!card) return;
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.tl-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) card.classList.add('open');
  applyMJMode(getMJMode());
}

(function(){ const _o=window.setMJMode; window.setMJMode=function(v){_o(v); if(TIMELINE_DATA&&TIMELINE_DATA.length) render(TIMELINE_DATA);}; })();
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
