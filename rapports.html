<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapports — La Larme d'Argent</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;font-family:'Crimson Text',serif;color:#f0f0f0;padding:0;}
#main-nav{position:sticky;top:0;z-index:100;background:#111;border-bottom:2px solid rgba(255,255,255,.18);box-shadow:0 2px 8px rgba(0,0,0,.5);}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;align-items:center;min-height:50px;gap:4px;}
.nav-brand{flex-shrink:0;margin-right:10px;padding-right:12px;border-right:1px solid #444;}
.nav-title{display:block;font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#fff;line-height:1.3;}
.nav-sub{display:block;font-family:'Cinzel',serif;font-size:.42rem;letter-spacing:.18em;color:rgba(255,255,255,.42);text-transform:uppercase;font-style:italic;}
.nav-links{display:flex;flex:1;gap:0;overflow-x:auto;scrollbar-width:none;}
.nav-links::-webkit-scrollbar{display:none;}
.nav-link{display:flex;flex-direction:column;align-items:center;padding:9px 8px;text-decoration:none;color:rgba(255,255,255,.42);font-family:'Cinzel',serif;transition:color .2s,border-color .2s;border-bottom:2px solid transparent;flex-shrink:0;}
.nav-link:hover{color:rgba(255,255,255,.82);border-bottom-color:rgba(255,255,255,.3);}
.nav-link.active{color:#fff;border-bottom-color:#fff;}
.nav-icon{font-size:.85rem;line-height:1;margin-bottom:2px;}
.nav-label{font-size:.44rem;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;}
.mj-toggle{flex-shrink:0;margin-left:8px;padding:5px 10px;background:transparent;border:1px solid #555;border-radius:20px;font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.38);cursor:pointer;transition:all .2s;white-space:nowrap;}
.mj-toggle:hover,.mj-toggle.mj-on{background:rgba(255,255,255,.1);border-color:#fff;color:#fff;}
.nav-burger{display:none;margin-left:8px;background:transparent;border:1px solid #555;color:rgba(255,255,255,.35);padding:4px 8px;cursor:pointer;font-size:1rem;border-radius:6px;}
@media(max-width:860px){.nav-links{display:none;}.nav-links.open{display:flex;flex-direction:column;position:fixed;top:50px;left:0;right:0;background:#111;border-bottom:2px solid rgba(255,255,255,.18);z-index:99;max-height:calc(100vh - 50px);overflow-y:auto;}.nav-link{flex-direction:row;justify-content:flex-start;gap:12px;padding:13px 20px;border-bottom:1px solid #333;}.nav-label{font-size:.62rem;}.nav-burger{display:block;}}
.mj-only{display:none;}

.page-wrap{max-width:900px;margin:0 auto;padding:20px 14px 56px;}

/* Session card */
.session-card{background:#1a1a1a;border:2px solid rgba(255,255,255,.18);border-radius:16px;overflow:hidden;margin-bottom:16px;}
.session-head{padding:14px 20px 12px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;}
.session-head:hover{background:#202020;}
.session-card.open .session-head{cursor:default;}
.session-head:hover .session-card.open{background:#1a1a1a;}
.session-num{width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:.88rem;font-weight:700;flex-shrink:0;margin-top:1px;}
.session-head-info{flex:1;min-width:0;}
.session-titre{font-family:'Cinzel',serif;font-size:.82rem;font-weight:700;letter-spacing:.04em;line-height:1.3;margin-bottom:4px;}
.session-meta{font-size:.78rem;color:rgba(255,255,255,.55);font-style:italic;line-height:1.5;}
.session-chevron{font-size:.65rem;color:rgba(255,255,255,.42);transition:transform .2s;margin-top:6px;flex-shrink:0;}
.session-card.open .session-chevron{transform:rotate(180deg);}

.session-body{display:none;}
.session-card.open .session-body{display:block;}

/* Tabs inside session */
.stab-bar{display:flex;gap:0;padding:0 20px;border-top:1px solid rgba(255,255,255,.07);background:#202020;}
.stab-btn{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;padding:8px 14px;background:transparent;color:rgba(255,255,255,.5);border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;}
.stab-btn:hover{color:#f0f0f0;}
.stab-btn.active{color:#fff;border-bottom-color:rgba(255,255,255,.7);font-weight:700;}

.stab-content{padding:16px 20px;}
.stab-panel{display:none;}
.stab-panel.active{display:block;}

/* Rapport header structuré */
.rapport-header{border:1.5px solid rgba(255,255,255,.15);border-radius:12px;margin-bottom:18px;overflow:hidden;}
.rh-block{padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.1);}
.rh-block:last-child{border-bottom:none;}
.rh-unite-title{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;text-align:center;line-height:1.3;}
.rh-unite-sub{font-family:'Crimson Text',serif;font-size:.82rem;font-style:italic;text-align:center;margin-top:6px;color:rgba(255,255,255,.6);}
.rh-sep{display:flex;align-items:center;padding:8px 18px;background:#202020;border-bottom:none;}
.rh-sep::before,.rh-sep::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.15);}
.rh-sep-inner{font-size:.9rem;color:rgba(255,255,255,.3);padding:0 14px;}
.rh-type-title{font-family:'Cinzel',serif;font-size:.88rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-align:center;}
.rh-type-sub{font-family:'Crimson Text',serif;font-size:.72rem;font-style:italic;text-transform:uppercase;letter-spacing:.08em;text-align:center;color:rgba(255,255,255,.5);margin-top:5px;}
.rh-meta-table{width:100%;border-collapse:collapse;}
.rh-meta-row td{padding:6px 0;vertical-align:top;border-bottom:1px solid rgba(255,255,255,.07);}
.rh-meta-row:last-child td{border-bottom:none;}
.rh-meta-label{font-family:'Cinzel',serif;font-size:.44rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.42);width:28%;padding-right:16px!important;padding-top:2px!important;}
.rh-meta-value{font-family:'Crimson Text',serif;font-size:.85rem;font-style:italic;line-height:1.6;}
.rapport-section-sep{display:flex;align-items:center;gap:12px;margin:20px 0;color:rgba(255,255,255,.25);}
.rapport-section-sep::before,.rapport-section-sep::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}
.rapport-section-head{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.45);margin:14px 0 6px;}

/* Rapport meta simple (sans en-têtes structurés) */
.rapport-meta{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.rapport-from{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);}
.rapport-sep{color:rgba(255,255,255,.3);}

/* Listes événements */
.sec-title{font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.16em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.18);padding-bottom:3px;margin-bottom:10px;margin-top:14px;}
.sec-title:first-child{margin-top:0;}
.evt-list{list-style:none;}
.evt-item{font-size:.82rem;line-height:1.65;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.07);display:flex;gap:8px;align-items:flex-start;}
.evt-item:last-child{border-bottom:none;}
.evt-item::before{content:'·';flex-shrink:0;font-size:1rem;margin-top:-1px;}
.rev-item::before{content:'◈';flex-shrink:0;font-size:.6rem;margin-top:3px;color:#c00;}
.dec-item::before{content:'✦';flex-shrink:0;font-size:.55rem;margin-top:3px;}

/* Texte rapport */
.rapport-text{font-size:.85rem;line-height:1.85;color:rgba(255,255,255,.85);white-space:pre-line;}

/* MJ block */
.mj-block{border:1.5px solid #c00;border-radius:10px;padding:9px 12px;}
.mj-block-title{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:#c00;margin-bottom:6px;}
.mj-block-txt{font-size:.78rem;font-style:italic;color:rgba(255,255,255,.78);line-height:1.6;}

/* Chips */
.chip-section{margin-top:10px;}
.chip-label{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:5px;}
.chip-list{display:flex;flex-wrap:wrap;gap:4px;}
.chip{font-size:.72rem;font-style:italic;color:rgba(255,255,255,.65);padding:1px 7px;border:1px solid rgba(255,255,255,.12);border-radius:8px;}
</style>
</head>
<body>

<div class="page-wrap">
  <div id="rapports-wrap">
    <p style="font-style:italic;color:rgba(255,255,255,.5);font-size:.82rem;text-align:center;padding:40px;">Chargement…</p>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/nav.js"></script>
<script>
let RAPPORTS_DATA = [];
let LIEUX_DATA    = [];
let PNJS_DATA     = [];

async function init() {
  try {
    [RAPPORTS_DATA, LIEUX_DATA, PNJS_DATA] = await Promise.all([
      loadData('rapports.json'),
      loadData('lieux.json').catch(() => []),
      loadData('pnjs.json').catch(() => [])
    ]);
    render(RAPPORTS_DATA);
  } catch(e) {
    document.getElementById('rapports-wrap').innerHTML =
      '<p style="color:#c00;font-size:.82rem;font-style:italic;text-align:center;padding:40px;">⚠ Données inaccessibles en file://. Utiliser un serveur local.</p>';
  }
}

// ── Résolution noms depuis IDs ───────────────────────────────────────────────
function lieuName(id) {
  const l = LIEUX_DATA.find(x => x.id === id);
  return l ? l.nom : id.replace('lieu_', '');
}
function pnjName(id) {
  const p = PNJS_DATA.find(x => x.id === id);
  return p ? p.nom : id.replace('pnj_', '');
}

// ── Rendu header structuré ───────────────────────────────────────────────────
function renderRapportHeader(s) {
  const hasHeader = s.en_tete_unite || s.en_tete_type || s.en_tete_attention || s.en_tete_objet;
  if (!hasHeader) {
    if (!s.auteur_nom && !s.destinataire) return '';
    return `<div class="rapport-meta">
      <span class="rapport-from">${s.auteur_nom || ''}</span>
      ${s.destinataire ? `<span class="rapport-sep">·</span><span class="rapport-from">${s.destinataire}</span>` : ''}
    </div>`;
  }
  let html = '<div class="rapport-header">';
  // 1. Bloc unite : titre centre grand + sous-titre italic
  if (s.en_tete_unite) {
    const uLines = s.en_tete_unite.split('\n').map(l => l.trim()).filter(Boolean);
    html += '<div class="rh-block">';
    if (uLines[0]) html += '<div class="rh-unite-title">' + uLines[0] + '</div>';
    if (uLines[1]) html += '<div class="rh-unite-sub">' + uLines[1] + '</div>';
    html += '</div>';
  }
  // 2. Separateur ornement + bloc type : titre centre bold + sous-titre italic
  if (s.en_tete_type) {
    html += '<div class="rh-block rh-sep"><span class="rh-sep-inner">⚜</span></div>';
    const tLines = s.en_tete_type.split('\n').map(l => l.trim()).filter(Boolean);
    html += '<div class="rh-block">';
    if (tLines[0]) html += '<div class="rh-type-title">' + tLines[0] + '</div>';
    if (tLines[1]) html += '<div class="rh-type-sub">' + tLines[1] + '</div>';
    html += '</div>';
  }
  // 3. Table meta : label | valeur (attention + objet combines)
  const allMeta = [];
  [s.en_tete_attention, s.en_tete_objet].forEach(field => {
    if (!field) return;
    const lines = field.split('\n').map(l => l.trim()).filter(Boolean);
    for (let i = 0; i + 1 < lines.length; i += 2)
      allMeta.push({ lbl: lines[i], val: lines[i + 1] });
  });
  if (allMeta.length) {
    html += '<div class="rh-block"><table class="rh-meta-table">';
    allMeta.forEach(row => {
      html += '<tr class="rh-meta-row">'
        + '<td class="rh-meta-label">' + row.lbl + '</td>'
        + '<td class="rh-meta-value">' + row.val + '</td>'
        + '</tr>';
    });
    html += '</table></div>';
  }
  html += '</div>';
  return html;
}
function renderRapportBody(text) {
  if (!text) return '';
  // Découper sur les titres de section (chiffres romains suivis d'un point)
  const parts = text.split(/(?=\n[IVX]+\.\n)/);
  if (parts.length <= 1) return `<div class="rapport-text">${text}</div>`;
  let html = '';
  parts.forEach((part, i) => {
    if (i > 0) html += '<div class="rapport-section-sep">⚜</div>';
    const m = part.match(/^\n([IVX]+\.)\n([\s\S]*)$/);
    if (m) {
      html += `<div class="rapport-section-head">${m[1]}</div>`;
      const title = part.split('\n')[2];
      if (title && title.trim()) html += `<div class="rapport-section-head" style="font-size:.7rem;color:rgba(255,255,255,.65);margin-top:0;letter-spacing:.08em;text-transform:none;font-style:italic;">${title}</div>`;
      html += `<div class="rapport-text">${part.replace(/^\n[IVX]+\.\n[^\n]*\n/, '')}</div>`;
    } else {
      html += `<div class="rapport-text">${part}</div>`;
    }
  });
  return html;
}

function render(rapports) {
  if (!getMJMode()) rapports = rapports.filter(r => r.visible_joueurs !== false);
  if (!rapports.length) {
    document.getElementById('rapports-wrap').innerHTML = '<p style="font-style:italic;color:rgba(255,255,255,.5);font-size:.82rem;text-align:center;padding:40px;">Aucun rapport disponible.</p>';
    return;
  }
  document.getElementById('rapports-wrap').innerHTML = rapports.map(buildCard).join('');
  const firstTab = document.querySelector('.stab-btn');
  if (firstTab) firstTab.classList.add('active');
  const firstPanel = document.querySelector('.stab-panel');
  if (firstPanel) firstPanel.classList.add('active');
  applyMJMode(getMJMode());
}

function buildCard(s) {
  const pnjsChips  = (s.pnjs_rencontres || []).map(id => `<span class="chip">${pnjName(id)}</span>`).join('');
  const lieuxChips = (s.lieux_visites  || []).map(id => `<span class="chip">${lieuName(id)}</span>`).join('');

  const evtsHTML  = (s.evenements_cles     || []).map(e => `<li class="evt-item">${e}</li>`).join('');
  const decsHTML  = (s.decisions_importantes || []).map(d => `<li class="evt-item dec-item">${d}</li>`).join('');
  const revsHTML  = (s.revelations          || []).map(r => `<li class="evt-item rev-item">${r}</li>`).join('');

  const mjPanelHTML = s.notes_mj ? `
    <div class="stab-panel" id="panel-mj-${s.id}">
      <div class="mj-block"><div class="mj-block-title">⚿ Notes MJ</div><div class="mj-block-txt">${s.notes_mj}</div></div>
    </div>` : '';

  return `
  <div class="session-card" id="sess-${s.id}">
    <div class="session-head" onclick="toggleSession('${s.id}',event)">
      <div class="session-num">${s.numero}</div>
      <div class="session-head-info">
        <div class="session-titre">${s.titre}</div>
        <div class="session-meta">${s.date_jeu} · Fiction : ${s.date_fiction}</div>
      </div>
      <span class="session-chevron">▾</span>
    </div>
    <div class="session-body">
      <div class="stab-bar">
        <button class="stab-btn" onclick="showTab('${s.id}','rapport',this)">Rapport</button>
        <button class="stab-btn" onclick="showTab('${s.id}','evenements',this)">Événements</button>
        <button class="stab-btn" onclick="showTab('${s.id}','decisions',this)">Décisions</button>
        <button class="stab-btn" onclick="showTab('${s.id}','revelations',this)">Révélations</button>
        ${s.notes_mj ? `<button class="stab-btn mj-only" onclick="showTab('${s.id}','mj',this)">⚿ MJ</button>` : ''}
      </div>
      <div class="stab-content">
        <div class="stab-panel" id="panel-rapport-${s.id}">
          ${renderRapportHeader(s)}
          ${renderRapportBody(s['rapport_diégetique'])}
        </div>
        <div class="stab-panel" id="panel-evenements-${s.id}">
          <div class="sec-title">Événements clés</div>
          <ul class="evt-list">${evtsHTML}</ul>
          ${pnjsChips  ? `<div class="chip-section"><div class="chip-label">PNJs rencontrés</div><div class="chip-list">${pnjsChips}</div></div>`  : ''}
          ${lieuxChips ? `<div class="chip-section"><div class="chip-label">Lieux visités</div><div class="chip-list">${lieuxChips}</div></div>` : ''}
        </div>
        <div class="stab-panel" id="panel-decisions-${s.id}">
          <div class="sec-title">Décisions importantes</div>
          <ul class="evt-list">${decsHTML}</ul>
        </div>
        <div class="stab-panel" id="panel-revelations-${s.id}">
          <div class="sec-title">Révélations</div>
          <ul class="evt-list">${revsHTML}</ul>
        </div>
        ${mjPanelHTML}
      </div>
    </div>
  </div>`;
}

function toggleSession(id, event) {
  if (['A','BUTTON','INPUT'].includes(event.target.tagName)) return;
  const card = document.getElementById('sess-' + id);
  if (!card) return;
  const isOpen = card.classList.contains('open');
  if (isOpen) { card.classList.remove('open'); return; }
  card.classList.add('open');
  const bar = card.querySelector('.stab-bar');
  if (bar && !bar.querySelector('.stab-btn.active')) {
    const firstBtn = bar.querySelector('.stab-btn');
    if (firstBtn) showTab(id, firstBtn.getAttribute('onclick').match(/'([^']+)'/g)[1].replace(/'/g,''), firstBtn);
  }
  applyMJMode(getMJMode());
}

function showTab(sessionId, tabName, btn) {
  const card = document.getElementById('sess-' + sessionId);
  if (!card) return;
  card.querySelectorAll('.stab-btn').forEach(b => b.classList.remove('active'));
  card.querySelectorAll('.stab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById(`panel-${tabName}-${sessionId}`);
  if (panel) panel.classList.add('active');
}

(function(){ const _o=window.setMJMode; window.setMJMode=function(v){_o(v); if(RAPPORTS_DATA&&RAPPORTS_DATA.length) render(RAPPORTS_DATA);}; })();
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
