<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lore — La Larme d'Argent</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;font-family:'Crimson Text',serif;color:#f0f0f0;padding:0;}
#main-nav{position:sticky;top:0;z-index:100;background:#111;border-bottom:2px solid rgba(255,255,255,.18);box-shadow:0 2px 8px rgba(0,0,0,.5);}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;align-items:center;min-height:50px;gap:4px;}
.nav-brand{flex-shrink:0;margin-right:10px;padding-right:12px;border-right:1px solid #444;}
.nav-title{display:block;font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#fff;line-height:1.3;}
.nav-sub{display:block;font-family:'Cinzel',serif;font-size:.42rem;letter-spacing:.18em;color:rgba(255,255,255,.42);text-transform:uppercase;font-style:italic;}
.nav-links{display:flex;flex:1;gap:0;overflow-x:auto;scrollbar-width:none;}
.nav-links::-webkit-scrollbar{display:none;}
.nav-link{display:flex;flex-direction:column;align-items:center;padding:9px 8px;text-decoration:none;color:rgba(255,255,255,.42);font-family:'Cinzel',serif;transition:color .2s,border-color .2s;border-bottom:2px solid transparent;flex-shrink:0;}
.nav-link:hover{color:rgba(255,255,255,.82);border-bottom-color:rgba(255,255,255,.3);}
.nav-link.active{color:#fff;border-bottom-color:#fff;}
.nav-icon{font-size:.85rem;line-height:1;margin-bottom:2px;}
.nav-label{font-size:.44rem;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;}
.mj-toggle{flex-shrink:0;margin-left:8px;padding:5px 10px;background:transparent;border:1px solid #555;border-radius:20px;font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.38);cursor:pointer;transition:all .2s;white-space:nowrap;}
.mj-toggle:hover,.mj-toggle.mj-on{background:rgba(255,255,255,.1);border-color:#fff;color:#fff;}
.nav-burger{display:none;margin-left:8px;background:transparent;border:1px solid #555;color:rgba(255,255,255,.35);padding:4px 8px;cursor:pointer;font-size:1rem;border-radius:6px;}
@media(max-width:860px){.nav-links{display:none;}.nav-links.open{display:flex;flex-direction:column;position:fixed;top:50px;left:0;right:0;background:#111;border-bottom:2px solid rgba(255,255,255,.18);z-index:99;max-height:calc(100vh - 50px);overflow-y:auto;}.nav-link{flex-direction:row;justify-content:flex-start;gap:12px;padding:13px 20px;border-bottom:1px solid #333;}.nav-label{font-size:.62rem;}.nav-burger{display:block;}}
.mj-only{display:none;}

.page-wrap{max-width:1100px;margin:0 auto;padding:20px 14px 56px;}
.filters-bar{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:14px;}
.filter-btn{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;background:#2a2a2a;color:rgba(255,255,255,.65);border:1.5px solid rgba(255,255,255,.2);border-radius:10px 10px 0 0;cursor:pointer;transition:all .15s;outline:none;position:relative;top:1px;}
.filter-btn:hover{background:#333;color:#f0f0f0;}
.filter-btn.active{background:#1a1a1a;color:#f0f0f0;border-color:rgba(255,255,255,.5);border-bottom-color:#1a1a1a;font-weight:700;z-index:2;}
.search-input{padding:5px 12px;background:#252525;border:1.5px solid rgba(255,255,255,.2);border-radius:20px;font-family:'Crimson Text',serif;font-size:.85rem;font-style:italic;color:#f0f0f0;outline:none;transition:border-color .15s;margin-left:auto;}
.search-input::placeholder{color:rgba(255,255,255,.42);}
.search-input:focus{border-color:rgba(255,255,255,.2);}
.count-line{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.42);margin-bottom:10px;}

.grid-wrap{background:#1a1a1a;border:2px solid rgba(255,255,255,.18);border-radius:0 16px 16px 16px;padding:16px;}
.lore-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;align-items:start;}

.lore-card{background:#1a1a1a;border:1.5px solid rgba(255,255,255,.15);border-radius:10px;overflow:hidden;cursor:pointer;transition:background .15s;}
.lore-card:not(.open):hover{background:#202020;}
.lore-card.open{cursor:default;border-width:2px;}
.lore-card-head{padding:12px 14px 10px;display:flex;align-items:flex-start;gap:10px;}
.lore-head-info{flex:1;min-width:0;}
.lore-titre{font-family:'Cinzel',serif;font-size:.78rem;font-weight:700;letter-spacing:.04em;line-height:1.2;margin-bottom:3px;}
.lore-cat{font-size:.72rem;font-style:italic;color:rgba(255,255,255,.55);}
.badge-col{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0;}
.l-badge{font-family:'Cinzel',serif;font-size:.44rem;letter-spacing:.1em;text-transform:uppercase;border:1.5px solid;border-radius:20px;padding:1px 8px;white-space:nowrap;}
.l-badge.joueurs{border-color:#3a7a2a;color:#3a7a2a;}
.l-badge.mj-seul{border-color:#c00;color:#c00;}
.lore-chevron{font-size:.65rem;color:rgba(255,255,255,.42);transition:transform .2s;margin-top:3px;flex-shrink:0;}
.lore-card.open .lore-chevron{transform:rotate(180deg);}
.lore-card-div{height:1px;background:rgba(255,255,255,.2);margin:0 14px;display:none;}
.lore-card.open .lore-card-div{display:block;}
.lore-body{padding:0 14px 12px;display:none;}
.lore-card.open .lore-body{display:block;}

.lore-contenu{font-size:.82rem;line-height:1.65;color:rgba(255,255,255,.78);font-style:italic;margin:10px 0 8px;}
.tag-list{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:.72rem;font-style:italic;color:rgba(255,255,255,.55);padding:1px 7px;border:1px solid rgba(255,255,255,.12);border-radius:8px;}

.empty-msg{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);text-align:center;padding:40px;grid-column:1/-1;}

@media(max-width:640px){.lore-grid{grid-template-columns:1fr;}.search-input{margin-left:0;width:100%;}}
</style>
</head>
<body>

<div class="page-wrap">
  <div class="filters-bar" id="filters-bar">
    <button class="filter-btn active" data-filter="tous" onclick="setFilter('tous',this)">Tous</button>
    <input class="search-input" type="text" id="search-input" placeholder="Rechercher…" oninput="applyFilters()">
  </div>
  <div class="count-line" id="count-line"></div>
  <div class="grid-wrap">
    <div class="lore-grid" id="lore-grid">
      <p style="font-style:italic;color:rgba(255,255,255,.5);font-size:.82rem;grid-column:1/-1;text-align:center;padding:24px;">Chargement…</p>
    </div>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/nav.js"></script>
<script>
let LORE_DATA = [];
let currentFilter = 'tous';

const LORE_CATS_KEY = 'sw_lore_cats';
const DEFAULT_LORE_CATS = ['cosmologie','bornes','voyage','factions','geographie','histoire','magie','autre'];

function getLoreCats() {
  try { const s = localStorage.getItem(LORE_CATS_KEY); if(s) return JSON.parse(s); } catch(e){}
  return [...DEFAULT_LORE_CATS];
}

function catLabel(cat) {
  if (!cat) return '';
  return cat.charAt(0).toUpperCase() + cat.slice(1);
}

function buildFilters() {
  const fromData = [...new Set(LORE_DATA.map(l => l.categorie).filter(Boolean))];
  const fromStore = getLoreCats();
  const all = [...new Set([...fromStore, ...fromData])];
  const bar = document.getElementById('filters-bar');
  const search = document.getElementById('search-input');
  bar.querySelectorAll('.filter-btn:not([data-filter="tous"])').forEach(b => b.remove());
  all.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = cat;
    btn.onclick = () => setFilter(cat, btn);
    btn.textContent = catLabel(cat);
    bar.insertBefore(btn, search);
  });
  const active = bar.querySelector('[data-filter="' + currentFilter + '"]');
  if (active) active.classList.add('active');
}

async function init() {
  try {
    LORE_DATA = await loadData('lore.json');
    buildFilters();
    applyFilters();
  } catch(e) {
    document.getElementById('lore-grid').innerHTML =
      '<p style="color:#c00;font-size:.82rem;font-style:italic;grid-column:1/-1;text-align:center;padding:24px;">⚠ Données inaccessibles en file://. Utiliser un serveur local.</p>';
  }
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  const isMJ = getMJMode();
  let filtered = isMJ ? LORE_DATA : LORE_DATA.filter(l => l.visible_joueurs !== false);
  if (currentFilter !== 'tous') filtered = filtered.filter(l => l.categorie === currentFilter);
  if (q) filtered = filtered.filter(l =>
    l.titre.toLowerCase().includes(q) ||
    l.contenu.toLowerCase().includes(q) ||
    (l.tags || []).some(t => t.toLowerCase().includes(q)));
  renderGrid(filtered);
  const total = LORE_DATA.length;
  document.getElementById('count-line').textContent =
    filtered.length === total ? `${total} entrées` : `${filtered.length} / ${total} entrées`;
}

function renderGrid(lore) {
  const grid = document.getElementById('lore-grid');
  if (!lore.length) { grid.innerHTML = '<p class="empty-msg">Aucune entrée correspondante.</p>'; return; }
  grid.innerHTML = lore.map(buildCard).join('');
  applyMJMode(getMJMode());
}

function buildCard(entry) {
  const catLbl = catLabel(entry.categorie);
  const visible = entry.visible_joueurs;
  const mjOnlyCls = visible ? '' : ' mj-only';

  const tagsHTML = (entry.tags || []).length
    ? `<div class="tag-list">${entry.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`
    : '';

  return `
  <div class="lore-card${mjOnlyCls}" id="lore-${entry.id}" onclick="toggleCard('${entry.id}',event)">
    <div class="lore-card-head">
      <div class="lore-head-info">
        <div class="lore-titre">${entry.titre}</div>
        <div class="lore-cat">${catLbl}</div>
      </div>
      <div class="badge-col">
        <span class="l-badge ${visible ? 'joueurs' : 'mj-seul'}">${visible ? 'Joueurs' : 'MJ seul'}</span>
      </div>
      <span class="lore-chevron">▾</span>
    </div>
    <div class="lore-card-div"></div>
    <div class="lore-body">
      <p class="lore-contenu">${entry.contenu}</p>
      ${tagsHTML}
    </div>
  </div>`;
}

function toggleCard(id, event) {
  if (['A','BUTTON','INPUT'].includes(event.target.tagName)) return;
  const card = document.getElementById('lore-' + id);
  if (!card) return;
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.lore-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) card.classList.add('open');
  applyMJMode(getMJMode());
}

(function(){ const _o=window.setMJMode; window.setMJMode=function(v){_o(v); if(LORE_DATA&&LORE_DATA.length) applyFilters();}; })();
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
